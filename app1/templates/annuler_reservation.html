<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuler la réservation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5 0%, #e6e9ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
        }

        .inner {
            padding: 2rem;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1f2e3e;
        }

        .warning {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border-left: 4px solid #ef4444;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-danger {
            flex: 1;
            background: #ef4444;
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            flex: 1;
            background: #6b7280;
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="inner">
            <div class="icon">⚠️</div>
            <h1>Confirmer l'annulation</h1>
            <p>Êtes-vous sûr de vouloir annuler cette réservation ?</p>
            <div class="warning">
                Cette action est irréversible !
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="btn-group">
                    <button type="submit" class="btn-danger">Oui, annuler</button>
                    <a href="{% url 'mes_reservations' %}" class="btn-secondary">Non, retour</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
