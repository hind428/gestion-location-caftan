{% extends 'app1/base.html' %}

{% block title %}Créer un gestionnaire - Admin{% endblock %}

{% block content %}
<style>
    .form-container {
        max-width: 500px;
        margin: 3rem auto;
        padding: 2rem;
        background: white;
        border-radius: 1.5rem;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 1rem;
    }
    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ddd;
        border-radius: 0.8rem;
    }
    .btn-create {
        width: 100%;
        padding: 0.8rem;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        border: none;
        border-radius: 2rem;
        font-weight: 600;
        cursor: pointer;
    }
    .btn-back {
        display: block;
        text-align: center;
        margin-top: 1rem;
        color: #667eea;
        text-decoration: none;
    }
</style>

<div class="form-container">
    <h1><i class="fas fa-user-plus"></i> Créer un compte Gestionnaire</h1>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-create">
            <i class="fas fa-check"></i> Créer le gestionnaire
        </button>
    </form>
    
    <a href="{% url 'admin_dashboard' %}" class="btn-back">← Retour au Dashboard</a>
</div>
{% endblock %}
